name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cv2
        ports:
          - 5432:5432
      minio:
        image: minio/minio
        options: --entrypoint ""
        env:
          MINIO_ROOT_USER: minio
          MINIO_ROOT_PASSWORD: minio123
        ports:
          - 9000:9000
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r backend/gateway/requirements.txt
          pip install -r backend/jd_agent/requirements.txt
          pip install -r backend/cv_agent/requirements.txt
          pip install -r backend/fit_agent/requirements.txt
      - name: Run backend tests
        run: |
          pytest backend/gateway
          pytest backend/jd_agent
          pytest backend/cv_agent
          pytest backend/fit_agent
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      - name: Run frontend tests
        run: |
          cd frontend
          npm run test
