# Render Blueprint — single-service deploy of the CV Screener.
#
# This system is presented as multi-agent (gateway + cv/jd/fit agents), but in
# the current code all CV/JD/Fit logic runs IN-PROCESS inside the gateway app
# (the per-agent dirs are empty placeholders). So one FastAPI service is the
# whole backend. The unified entry point is backend/app_combined.py, which wires
# up import paths and re-exports the gateway app. See DEPLOY.md.
services:
  - type: web
    name: cv-screener
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app_combined:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Required: your OpenAI API key (set in the Render dashboard).
      - key: OPENAI_API_KEY
        sync: false
      # Comma-separated list of allowed CORS origins (e.g. your Vercel URL).
      - key: ALLOWED_ORIGINS
        sync: false
